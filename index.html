<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Uploader</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f7fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #1f4e79;
    }

    .section-title {
      font-size: 18px;
      margin: 20px 0 10px;
      color: #1f4e79;
      font-weight: bold;
      border-bottom: 2px solid #e5edf7;
      padding-bottom: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .full {
      grid-column: span 2;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #1f4e79;
      box-shadow: 0 0 0 2px rgba(31,78,121,0.15);
    }

    .btn {
      background: #1f4e79;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #163854;
    }

    .btn-secondary {
      background: #2e8b57;
    }

    .btn-secondary:hover {
      background: #226b42;
    }

    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .preview-box {
      margin-top: 8px;
      width: 100%;
      height: 150px;
      border: 2px dashed #ccc;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fafafa;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-placeholder {
      font-size: 12px;
      color: #888;
      text-align: center;
      padding: 10px;
    }

    .submit-btn {
      margin-top: 25px;
      background: #0d6efd;
      font-size: 16px;
    }

    .submit-btn:hover {
      background: #0b5ed7;
    }

    .status {
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-weight: bold;
    }

    .success {
      background: #e8f8ee;
      color: #1b7a3d;
      border: 1px solid #bde7cb;
    }

    .error {
      background: #fdecec;
      color: #b42318;
      border: 1px solid #f5c2c7;
    }

    @media (max-width: 768px) {
      .grid, .image-grid {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Product Uploader</h1>

    <div class="section-title">Product Images (4)</div>
    <div class="image-grid">
      <div>
        <label for="image1">Image 1 *</label>
        <input type="file" id="image1" accept="image/*" />
        <div class="preview-box" id="preview1"><div class="preview-placeholder">No image selected</div></div>
      </div>
      <div>
        <label for="image2">Image 2</label>
        <input type="file" id="image2" accept="image/*" />
        <div class="preview-box" id="preview2"><div class="preview-placeholder">No image selected</div></div>
      </div>
      <div>
        <label for="image3">Image 3</label>
        <input type="file" id="image3" accept="image/*" />
        <div class="preview-box" id="preview3"><div class="preview-placeholder">No image selected</div></div>
      </div>
      <div>
        <label for="image4">Image 4</label>
        <input type="file" id="image4" accept="image/*" />
        <div class="preview-box" id="preview4"><div class="preview-placeholder">No image selected</div></div>
      </div>
    </div>

    <div class="section-title">Product Details</div>
    <div class="grid">
      <div class="full">
        <label for="productName">Product Name *</label>
        <input type="text" id="productName" placeholder="Enter product name" />
      </div>

      <div>
        <label for="costPrice">Product Cost Price *</label>
        <input type="number" id="costPrice" placeholder="Enter cost price" />
      </div>

      <div>
        <label for="maxPrice">Maximum Selling Price *</label>
        <input type="number" id="maxPrice" placeholder="Enter max selling price" />
      </div>

      <div>
        <label for="barcode">Barcode</label>
        <input type="text" id="barcode" placeholder="Enter or auto-generate on submit" />
      </div>

      <div>
        <label>&nbsp;</label>
        <button type="button" class="btn btn-secondary" onclick="generateBarcode()">Generate Barcode</button>
      </div>

      <div>
        <label for="sku">SKU</label>
        <input type="text" id="sku" placeholder="Enter or auto-generate on submit" />
      </div>

      <div>
        <label>&nbsp;</label>
        <button type="button" class="btn btn-secondary" onclick="generateSKU()">Generate SKU</button>
      </div>
    </div>

    <div class="section-title">Optional Dimensions</div>
    <div class="grid">
      <div>
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="Optional height" />
      </div>

      <div>
        <label for="width">Width (cm)</label>
        <input type="number" id="width" placeholder="Optional width" />
      </div>

      <div class="full">
        <label for="weight">Weight (kg)</label>
        <input type="number" step="0.01" id="weight" placeholder="Optional weight in kg" />
      </div>
    </div>

    <button class="btn submit-btn" onclick="submitProduct()">Submit Product</button>

    <div id="statusMessage" class="status"></div>
  </div>

  <script>
    // ===============================
    // YOUR LATEST MAKE WEBHOOK
    // ===============================
    const WEBHOOK_URL = "https://hook.eu1.make.com/8if4qnhgeayp7gjo2vtn8oodvhy02bsf";

    let imageData = {
      image1: null,
      image2: null,
      image3: null,
      image4: null
    };

    function showStatus(message, type) {
      const status = document.getElementById("statusMessage");
      status.style.display = "block";
      status.className = "status " + type;
      status.innerText = message;
    }

    function generateBarcode() {
      const barcode = "89" + Math.floor(10000000000 + Math.random() * 90000000000).toString();
      document.getElementById("barcode").value = barcode.slice(0, 13);
    }

    function generateSKU() {
      const name = document.getElementById("productName").value.trim();
      let prefix = "PRD";

      if (name) {
        prefix = name.replace(/[^a-zA-Z0-9]/g, "").substring(0, 4).toUpperCase() || "PRD";
      }

      const randomPart = Math.floor(1000 + Math.random() * 9000);
      const sku = `${prefix}-${randomPart}`;
      document.getElementById("sku").value = sku;
    }

    function handleImageUpload(inputId, previewId, key) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);

      input.addEventListener("change", function () {
        const file = input.files[0];
        if (!file) {
          imageData[key] = null;
          preview.innerHTML = '<div class="preview-placeholder">No image selected</div>';
          return;
        }

        const reader = new FileReader();

        reader.onload = function (e) {
          const base64 = e.target.result;
          imageData[key] = {
            name: file.name,
            type: file.type,
            data: base64
          };

          preview.innerHTML = `<img src="${base64}" alt="Preview">`;
        };

        reader.readAsDataURL(file);
      });
    }

    handleImageUpload("image1", "preview1", "image1");
    handleImageUpload("image2", "preview2", "image2");
    handleImageUpload("image3", "preview3", "image3");
    handleImageUpload("image4", "preview4", "image4");

    async function submitProduct() {
      const productName = document.getElementById("productName").value.trim();
      const costPrice = document.getElementById("costPrice").value.trim();
      const maxPrice = document.getElementById("maxPrice").value.trim();
      let barcode = document.getElementById("barcode").value.trim();
      let sku = document.getElementById("sku").value.trim();
      const height = document.getElementById("height").value.trim();
      const width = document.getElementById("width").value.trim();
      const weight = document.getElementById("weight").value.trim();

      if (!productName || !costPrice || !maxPrice) {
        showStatus("Please fill Product Name, Cost Price, and Max Selling Price.", "error");
        return;
      }

      if (!imageData.image1) {
        showStatus("Please upload at least Image 1.", "error");
        return;
      }

      if (!barcode) {
        barcode = "89" + Math.floor(10000000000 + Math.random() * 90000000000).toString();
        barcode = barcode.slice(0, 13);
        document.getElementById("barcode").value = barcode;
      }

      if (!sku) {
        let prefix = productName.replace(/[^a-zA-Z0-9]/g, "").substring(0, 4).toUpperCase() || "PRD";
        const randomPart = Math.floor(1000 + Math.random() * 9000);
        sku = `${prefix}-${randomPart}`;
        document.getElementById("sku").value = sku;
      }

      showStatus("Uploading product... Please wait.", "success");

      const payload = {
        productName,
        costPrice,
        maxPrice,
        barcode,
        sku,
        height,
        width,
        weight,
        image1: imageData.image1,
        image2: imageData.image2,
        image3: imageData.image3,
        image4: imageData.image4,
        submittedAt: new Date().toISOString()
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error("Webhook request failed");
        }

        showStatus("Product uploaded successfully!", "success");
        clearForm();
      } catch (error) {
        console.error(error);
        showStatus("Upload failed. Check webhook, Make scenario, or internet connection.", "error");
      }
    }

    function clearForm() {
      document.getElementById("productName").value = "";
      document.getElementById("costPrice").value = "";
      document.getElementById("maxPrice").value = "";
      document.getElementById("barcode").value = "";
      document.getElementById("sku").value = "";
      document.getElementById("height").value = "";
      document.getElementById("width").value = "";
      document.getElementById("weight").value = "";

      ["image1", "image2", "image3", "image4"].forEach((id, index) => {
        document.getElementById(id).value = "";
        document.getElementById("preview" + (index + 1)).innerHTML =
          '<div class="preview-placeholder">No image selected</div>';
      });

      imageData = {
        image1: null,
        image2: null,
        image3: null,
        image4: null
      };
    }
  </script>
</body>
</html>
