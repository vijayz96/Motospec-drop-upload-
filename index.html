<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make Webhook Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      padding: 30px;
      margin: 0;
    }

    .box {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    h2 {
      color: #1f4e79;
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      background: #0d6efd;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0b5ed7;
    }

    #msg {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-weight: bold;
    }

    .ok {
      background: #e8f8ee;
      color: #1b7a3d;
    }

    .bad {
      background: #fdecec;
      color: #b42318;
    }

    .small {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Make Webhook Test</h2>
    <button onclick="sendTest()">Send Test Data</button>
    <div id="msg"></div>
    <div class="small">This sends data directly to Make (no image upload, no Cloudinary).</div>
  </div>

  <script>
    const WEBHOOK_URL = "https://hook.eu1.make.com/1l4gnm6necayfstbxiq65oe6jr4rk111";

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.style.display = "block";
      msg.className = type;
      msg.innerText = text;
    }

    async function sendTest() {
      try {
        showMsg("Sending test data...", "ok");

        const payload = {
          productName: "TEST PRODUCT",
          costPrice: "100",
          maxPrice: "150",
          barcode: "8901234567890",
          sku: "TEST-1001",
          height: "10",
          width: "5",
          weight: "0.4",
          image1Url: "https://example.com/image1.jpg",
          image2Url: "",
          image3Url: "",
          image4Url: "",
          submittedAt: new Date().toISOString()
        };

        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error("Webhook failed");
        }

        showMsg("Test sent successfully! Check Make now.", "ok");
      } catch (err) {
        console.error(err);
        showMsg("Failed. Webhook URL or Make scenario issue.", "bad");
      }
    }
  </script>
</body>
</html>
